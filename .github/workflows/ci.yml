name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / build · vet · gofmt · test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match go.mod's toolchain. setup-go auto-resolves go.mod's `go`
          # directive when go-version-file is set; pin via go-version-file
          # so a future bump in go.mod is honored without editing this file.
          go-version-file: go.mod
          check-latest: true
          cache: true

      - run: go version

      - name: gofmt -l (must print nothing)
        run: |
          out=$(gofmt -l cmd internal mcp)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet ./...
        run: go vet ./...

      - name: go build ./...
        run: go build ./...

      # The golden embed tests in internal/embed/golden_test.go skip
      # themselves cleanly when testdata/model/ is absent (it is —
      # gitignored, downloaded per-machine), so the default `go test ./...`
      # is the right CI command. The parity test (build tag `parity`) is
      # opt-in for the same reason and is not run in CI.
      - name: go test ./...
        run: go test ./...

  # v0.7.0 (ADR-017) + v0.7.1 (ADR-018) Tier-2 integration tests: spin
  # up Postgres and run the full internal/db integration suite (which
  # also covers the SQLite file-based engine since SQLite needs no
  # service container). Ubuntu-only because GitHub Actions service
  # containers don't run on macos-latest. The default `go test ./...`
  # job above doesn't depend on this — it always runs on both OSes and
  # the dbintegration tests are gated by the build tag, so non-DB runs
  # skip them silently.
  test-db-integration:
    name: ubuntu / DB integration (Postgres + SQLite)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # postgres:16-alpine ships with pg_isready; the service waits
        # for the healthcheck to go green before the test step runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # Runs both Postgres tests (need KEN_DB_TEST_DSN) and SQLite tests
      # (no env required — temp .db file). Same -tags=dbintegration gate.
      - name: internal/db integration tests (Postgres + SQLite)
        env:
          KEN_DB_TEST_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        run: go test -tags=dbintegration ./internal/db/

      # Also exercise the cmd/ken-mcp DB-variant stdout-cleanliness test
      # against the live Postgres — confirms pgx + the Refresher don't
      # leak to stdout when the full Tier-2 code path runs in the
      # spawned subprocess. This test skips cleanly when KEN_DB_TEST_DSN
      # is unset, so it only meaningfully runs in this job.
      - name: cmd/ken-mcp stdout audit with Postgres
        env:
          KEN_DB_TEST_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        run: go test ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithDB -v

      # v0.7.1: confirm modernc.org/sqlite stays silent on stdout when
      # KEN_DB_DSN points at a SQLite file. Uses a temp .db created by
      # the test itself; no service container needed (this also runs
      # successfully in the default test job, but we re-run here in -v
      # for parity with the Postgres audit).
      - name: cmd/ken-mcp stdout audit with SQLite
        run: go test ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithSQLite -v
