name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / build · vet · gofmt · test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match go.mod's toolchain. setup-go auto-resolves go.mod's `go`
          # directive when go-version-file is set; pin via go-version-file
          # so a future bump in go.mod is honored without editing this file.
          go-version-file: go.mod
          check-latest: true
          cache: true

      - run: go version

      - name: gofmt -l (must print nothing)
        run: |
          # `chunk` moved into the aikit module per ADR-034, so it
          # is no longer a directory in this repo. The list below is
          # every top-level Go directory that lives in `ken/`.
          out=$(gofmt -l bench cmd demos internal mcp)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet ./...
        run: go vet ./...

      # golangci-lint with the conservative config at .golangci.yml.
      # Conservative posture: errcheck + govet + ineffassign +
      # staticcheck + unused + gosimple (no QF1001/QF1003 stylistic
      # quickfix rules; deferred Close + log writer false-positives
      # excluded via the config). Linux-only (the matrix runs on
      # macOS too, but golangci-lint is deterministic across
      # platforms and there's no value in running it twice).
      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: go build ./...
        run: go build ./...

      # ADR-033: the release binaries are built slim (only the grammars
      # ken's treesitter chunker dispatches) via the grammar_subset tags
      # in .goreleaser.yml. Compile-smoke that exact slim build here so a
      # broken subset build is caught at PR time, not at release time.
      # The drift between this tag set and kenToTreeSitter is guarded by
      # chunk/treesitter's TestSubsetTagsMatchKenToTreeSitter (default build).
      - name: slim build compile-smoke (grammar_subset)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tags="$(scripts/subset-tags.sh)"
          echo "subset tags: $tags"
          CGO_ENABLED=0 go build -tags "$tags" -o /dev/null ./cmd/ken ./cmd/ken-mcp

      # The golden embed tests in internal/embed/golden_test.go skip
      # themselves cleanly when testdata/model/ is absent (it is —
      # gitignored, downloaded per-machine), so the default `go test ./...`
      # is the right CI command. The parity test (build tag `parity`) is
      # opt-in for the same reason and is not run in CI.
      - name: go test ./...
        run: go test ./...

  # Windows smoke. The `test` matrix above is ubuntu+macos (its gofmt /
  # slim-build steps are bash-specific); this dedicated job guards the
  # Windows surface — cross-compile, the sighup_windows.go no-op path, the
  # MCP stdio contract, and binary-actually-runs — so a Windows regression
  # is caught at PR time, not at release time (Windows binaries ship as of
  # v0.10.0). bash is available on windows runners for the slim/grammar
  # steps; everything else uses the default shell.
  smoke-windows:
    name: windows / build · slim · run · core tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: go build ./...
        run: go build ./...

      # Compile the exact slim release binaries (the grammar_subset tags
      # from .goreleaser.yml) on Windows, so a windows-only slim-build
      # break surfaces here rather than mid-release.
      - name: slim release build compile-smoke (grammar_subset)
        shell: bash
        run: |
          tags="$(scripts/subset-tags.sh)"
          echo "subset tags: $tags"
          CGO_ENABLED=0 go build -tags "$tags" -o ken.exe ./cmd/ken
          CGO_ENABLED=0 go build -tags "$tags" -o ken-mcp.exe ./cmd/ken-mcp

      # The binary actually runs on Windows: a bm25 search (no model) over
      # the polyglot fixture must return the expected hit.
      - name: smoke — ken search runs (bm25, no model)
        shell: bash
        run: ./ken.exe search ./testdata/repo "validate" -k 3 --mode bm25 | grep -q "auth.py"

      # Core unit tests on Windows: retrieval + structural (incl. C#) +
      # repo walk + the MCP package + the cmd/ken-mcp binary stdout-contract
      # tests (which validate the MCP-over-stdio path on Windows). DB
      # integration is gated behind -tags=dbintegration, so it's skipped.
      - name: core unit tests
        run: go test ./internal/search/ ./internal/structural/ ./internal/repo/ ./mcp/ ./cmd/ken-mcp/

  # Race-detector pass on the full unit suite. Lives in a separate
  # job from `test` so the ~2-3x slowdown from `-race` runs in
  # parallel with fast-feedback CI rather than blocking it.
  # ubuntu-latest only — the race detector is deterministic across
  # platforms and the macOS runner-time cost isn't worth doubling.
  #
  # M1 in the post-v0.8.3 bug review was a real data race in the
  # cmd/ken-mcp stdout-cleanliness tests, fixed via the safeBuf
  # wrapper. This job is the regression guard for that class of
  # bug — anything that introduces a shared-state race under
  # subprocess I/O capture (or anywhere else in the codebase) will
  # surface here before merge.
  test-race:
    name: ubuntu / go test -race ./...
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go test -race ./...
        run: go test -race ./...

  # v0.7.0 (ADR-017) + v0.7.1 (ADR-018) + v0.7.2 (ADR-019) Tier-2
  # integration tests: spin up Postgres + MySQL and run the full
  # internal/db integration suite (which also covers the SQLite
  # file-based engine since SQLite needs no service container).
  # Ubuntu-only because GitHub Actions service containers don't run on
  # macos-latest. The default `go test ./...` job above doesn't depend
  # on this — it always runs on both OSes and the dbintegration tests
  # are gated by the build tag, so non-DB runs skip them silently.
  #
  # Known transient flake (2026-06-02): when Docker Hub is slow or
  # rate-limiting, the service-container init step ("Initialize
  # containers") fails before any step we control runs — Actions'
  # built-in pull-retry-with-backoff exhausts its window and the
  # entire job goes red. There's no in-workflow mitigation because
  # the failure is in the runner's service provisioning, not in our
  # steps. Live mitigation: `gh run rerun <run-id> --failed` (the
  # already-green jobs stay green; only this one re-runs). Permanent
  # fix: mirror `postgres:16-alpine` + `mysql:8` + `mariadb:10` to
  # ghcr.io to escape Docker Hub rate limits and (mostly) escape
  # Docker Hub outages. Deferred until the flake becomes load-bearing
  # for a release — tracked in road-to-1.0.md.
  test-db-integration:
    name: ubuntu / DB integration (Postgres + SQLite + MySQL + MariaDB + Listen)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # postgres:16-alpine ships with pg_isready; the service waits
        # for the healthcheck to go green before the test step runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: postgres
        ports:
          - 3306:3306
        # mysqladmin ping is the documented healthcheck for the
        # official image; --silent suppresses the connection-refused
        # noise during startup. Healthy-then-green gates the test step.
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -ptest --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      # v0.8.1 Part B (ADR-021): MariaDB promoted to first-class engine
      # support. Shares the MySQL code path + driver (wire-compatible);
      # v0.8.1 normalizes the only substantive INFORMATION_SCHEMA
      # divergence (integer display widths) so cross-engine chunks are
      # byte-identical. mariadb-admin ping is the canonical healthcheck
      # for the official mariadb image (mysqladmin still works but
      # mariadb-admin is the version-stable name post-fork).
      mariadb:
        image: mariadb:11-jammy
        env:
          MARIADB_ROOT_PASSWORD: test
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mariadb-admin ping -h localhost -ptest --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # v0.8.0 (ADR-020): install the LISTEN/NOTIFY event trigger so
      # internal/db/listen_integration_test.go can exercise the happy-path,
      # debounce, missing-trigger, and reconnect scenarios. The script is
      # idempotent (DROP IF EXISTS + CREATE), so re-running across jobs
      # is safe; the missing-trigger test drops it itself before testing.
      - name: Install ken LISTEN/NOTIFY event trigger
        env:
          PGPASSWORD: test
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -f internal/db/scripts/postgres_listen_notify.sql

      # Runs Postgres tests (need KEN_DB_TEST_DSN), SQLite tests (no
      # env — temp .db file), and MySQL tests (need KEN_DB_MYSQL_TEST_DSN).
      # Same -tags=dbintegration gate; per-test file checks the relevant
      # env var and skips if absent. v0.8.0: also runs the four listener
      # integration tests against the trigger installed above.
      - name: internal/db integration tests (Postgres + SQLite + MySQL + MariaDB + Listen)
        env:
          KEN_DB_TEST_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
          KEN_DB_MYSQL_TEST_DSN: root:test@tcp(127.0.0.1:3306)/?parseTime=true&multiStatements=true
          # v0.8.1 Part B: the MySQL integration suite is parameterized
          # over both engines; the runner skips MariaDB if this DSN is
          # unset, matching the existing MySQL skip behavior.
          KEN_DB_MARIADB_TEST_DSN: root:test@tcp(127.0.0.1:3307)/?parseTime=true&multiStatements=true
        run: go test -tags=dbintegration ./internal/db/

      # Also exercise the cmd/ken-mcp DB-variant stdout-cleanliness test
      # against the live Postgres — confirms pgx + the Refresher don't
      # leak to stdout when the full Tier-2 code path runs in the
      # spawned subprocess. This test skips cleanly when KEN_DB_TEST_DSN
      # is unset, so it only meaningfully runs in this job.
      - name: cmd/ken-mcp stdout audit with Postgres
        env:
          KEN_DB_TEST_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        # -race here regression-guards M1 against the live-DB
        # subprocess path: the audits exercise the exec.Cmd +
        # stderr-capture pattern that surfaced the original race.
        run: go test -race ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithDB -v

      # v0.7.1: confirm modernc.org/sqlite stays silent on stdout when
      # KEN_DB_DSN points at a SQLite file. Uses a temp .db created by
      # the test itself; no service container needed (this also runs
      # successfully in the default test job, but we re-run here in -v
      # for parity with the Postgres audit).
      - name: cmd/ken-mcp stdout audit with SQLite
        run: go test -race ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithSQLite -v

      # v0.7.2: confirm go-sql-driver/mysql stays silent on stdout when
      # KEN_DB_DSN points at a MySQL instance. The mysql:8 service
      # container is the same one the integration suite uses; this test
      # additionally drives a full MCP session through CommandTransport.
      # Pre-creates the ken_test database so wireDBTier2's MySQL
      # introspection path has something to talk to.
      - name: prepare ken_test database (MySQL)
        run: |
          mysql -h 127.0.0.1 -uroot -ptest -e 'CREATE DATABASE IF NOT EXISTS ken_test;'
      - name: cmd/ken-mcp stdout audit with MySQL
        env:
          KEN_DB_MYSQL_TEST_DSN: root:test@tcp(127.0.0.1:3306)/ken_test?parseTime=true
        run: go test -race ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithMySQL -v

      # v0.8.1 Part B (ADR-021): same audit against MariaDB. Driver
      # is shared with MySQL (go-sql-driver/mysql), so the stdout
      # contract is wire-protocol-tested by the MySQL variant; this
      # test additionally exercises the integer-display-width
      # normalization path against the live MariaDB server-version
      # output. mysql client speaks to MariaDB on port 3307 here.
      - name: prepare ken_test database (MariaDB)
        run: |
          mysql -h 127.0.0.1 -P 3307 -uroot -ptest -e 'CREATE DATABASE IF NOT EXISTS ken_test;'
      - name: cmd/ken-mcp stdout audit with MariaDB
        env:
          KEN_DB_MARIADB_TEST_DSN: root:test@tcp(127.0.0.1:3307)/ken_test?parseTime=true
        run: go test -race ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithMariaDB -v

      # v0.8.0 (ADR-020): confirm the listener's dedicated pgx.Conn
      # doesn't leak anything to stdout when KEN_DB_LISTEN=1 fires the
      # listener goroutine. The trigger was installed in the earlier
      # "Install ken LISTEN/NOTIFY event trigger" step.
      - name: cmd/ken-mcp stdout audit with LISTEN/NOTIFY
        env:
          KEN_DB_TEST_DSN: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        run: go test -race ./cmd/ken-mcp/ -run TestBinary_StdoutIsCleanJSONRPC_WithListen -v
