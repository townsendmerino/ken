name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # to attach binaries to the release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on townsendmerino/homebrew-tap + scoop-bucket,
          # so GoReleaser can push the generated cask + scoop manifest cross-repo
          # (the default GITHUB_TOKEN is scoped to this repo only). See .goreleaser.yml.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
